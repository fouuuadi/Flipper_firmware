; Firmware ESP32 des boutons physiques de la borne flipper HETIC.
; Lit les GPIO et publie les appuis sur MQTT (cf. contrat dans le README).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
; Config injectée par variables d'environnement (site Fliphetic / shell), comme
; le .env du back : aucune valeur en dur ni committée. Variables requises :
;   WIFI_SSID, WIFI_PASSWORD, MQTT_BROKER_IP, MQTT_BROKER_PORT, DEVICE_ID
; NB : `MQTT_BROKER_IP` (et non MQTT_BROKER_HOST) car côté back MQTT_BROKER_HOST
; vaut `mqtt` (service Docker) ; le firmware, lui, a besoin de l'IP de la borne.
build_flags =
    '-DWIFI_SSID="${sysenv.WIFI_SSID}"'
    '-DWIFI_PASSWORD="${sysenv.WIFI_PASSWORD}"'
    '-DMQTT_BROKER_HOST="${sysenv.MQTT_BROKER_IP}"'
    -DMQTT_BROKER_PORT=${sysenv.MQTT_BROKER_PORT}
    '-DDEVICE_ID="${sysenv.DEVICE_ID}"'
